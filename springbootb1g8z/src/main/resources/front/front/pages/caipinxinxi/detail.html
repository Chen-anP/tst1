<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<title>菜品详情</title>
	<link rel="stylesheet" href="../../layui/css/layui.css">
	<link rel="stylesheet" href="../../css/style.css" />
	<link rel="stylesheet" href="../../css/theme.css" />
	<link rel="stylesheet" href="../../css/common.css" />
</head>
<style>
	html::after {
		position: fixed;
		top: 0;
		right: 0;
		left: 0;
		bottom: 0;
		content: '';
		display: block;
		background-attachment: fixed;
		background-size: cover;
		background-position: center;
		background-image: url(http://codegen.caihongy.cn/20220129/7c2b359bf9c846cead5ed9ffec79e932.png);
		z-index: -1;
	}

	.data-detail {
		padding-bottom: 20px;
	}
	.data-detail .layui-breadcrumb a.first {
		color: #999 !important;
	}
	.detail-container {
		width: 980px;
		margin: 0 auto;
		background: #fff;
		border-radius: 12px;
		overflow: hidden;
		box-shadow: 0px 3px 6px rgba(0, 0, 0, 0.16);
	}
	.detail-img {
		width: 100%;
		height: 360px;
		overflow: hidden;
	}
	.detail-img img {
		width: 100%;
		height: 100%;
		object-fit: cover;
	}
	.detail-info {
		padding: 20px 30px;
	}
	.detail-info .detail-name {
		font-size: 24px;
		font-weight: bold;
		color: #333;
		margin-bottom: 15px;
	}
	.detail-info .detail-price {
		font-size: 28px;
		color: red;
		font-weight: bold;
		margin: 15px 0;
	}
	.detail-info .detail-price span {
		font-size: 16px;
	}
	.detail-info .detail-meta {
		display: flex;
		gap: 30px;
		margin: 15px 0;
		padding: 15px 0;
		border-top: 1px solid #eee;
		border-bottom: 1px solid #eee;
	}
	.detail-info .detail-meta .meta-item {
		font-size: 14px;
		color: #666;
	}
	.detail-info .detail-meta .meta-item strong {
		color: #333;
		margin-right: 5px;
	}
	.detail-info .detail-desc {
		margin-top: 15px;
		font-size: 14px;
		color: #666;
		line-height: 1.8;
	}
	.detail-actions {
		padding: 20px 30px;
		text-align: right;
		border-top: 1px solid #eee;
	}
</style>
<body>
	<div id="app">
		<div class="data-detail" style="padding:0">
			<div class="data-detail-breadcrumb" :style='{"padding":"0 10px","boxShadow":"0 0 0px rgba(255,0,0,.3)","margin":"20px auto","borderColor":"rgba(213, 169, 122, 1)","backgroundColor":"rgba(223, 195, 153, 1)","borderRadius":"10px","borderWidth":"10px 0 0","borderStyle":"solid","height":"54px","width":"980px"}'>
				<span class="layui-breadcrumb">
					<a class="first" :style='{"padding":"8px 10px","boxShadow":"0 0 6px rgba(255,0,0,0)","margin":"0 5px","borderColor":"rgba(255,0,0,.3)","backgroundColor":"rgba(255, 255, 255, 0)","color":"#999","borderRadius":"0","borderWidth":"0","fontSize":"16px","borderStyle":"solid"}' href="../home/home.html">首页</a>
					<a class="first" :style='{"padding":"8px 10px","boxShadow":"0 0 6px rgba(255,0,0,0)","margin":"0 5px","borderColor":"rgba(255,0,0,.3)","backgroundColor":"rgba(255, 255, 255, 0)","color":"#999","borderRadius":"0","borderWidth":"0","fontSize":"16px","borderStyle":"solid"}' href="../caipinxinxi/list.html">菜品信息</a>
					<a><cite :style='{"padding":"8px 15px","boxShadow":"0 0 0px rgba(255,0,0,.3)","margin":"0 15px","borderColor":"rgba(255,0,0,.3)","backgroundColor":"rgba(255, 255, 255, 0)","color":"rgba(255, 255, 255, 1)","borderRadius":"4px","borderWidth":"0","fontSize":"16px","borderStyle":"solid"}'>菜品详情</cite></a>
				</span>
			</div>
		</div>
		<div class="detail-container">
			<div class="detail-img">
				<img :src="detail.caipintupian ? baseurl + detail.caipintupian : '../../xznstatic/img/zwimg.jpg'" :alt="detail.caipinmingcheng">
			</div>
			<div class="detail-info">
				<div class="detail-name">{{detail.caipinmingcheng}}</div>
				<div class="detail-price"><span>￥</span>{{Number(detail.jiage).toFixed(2)}}</div>
				<div class="detail-meta">
					<div class="meta-item"><strong>餐类型：</strong>{{detail.canleixing}}</div>
					<div class="meta-item"><strong>份额：</strong>{{detail.fene}}</div>
					<div class="meta-item"><strong>浏览次数：</strong>{{detail.clicknum || 0}} 次</div>
				</div>
				<div class="detail-desc" v-if="detail.caipinjieshao">
					<strong>菜品介绍：</strong><br>
					<span v-html="detail.caipinjieshao"></span>
				</div>
			</div>
			<div class="detail-actions">
				<button :style='{"padding":"0 20px","boxShadow":"0 0 0px rgba(255,0,0,.3)","margin":"0 5px","borderColor":"rgba(0,0,0,.3)","backgroundColor":"rgba(203, 148, 92, 1)","color":"rgba(255, 255, 255, 1)","borderRadius":"44px","borderWidth":"0","width":"auto","lineHeight":"34px","fontSize":"14px","borderStyle":"solid"}' @click="jump('../caipinxinxi/list.html')" type="button" class="layui-btn">
					返回列表
				</button>
			</div>
		</div>
	</div>

	<script src="../../layui/layui.js"></script>
	<script src="../../js/vue.js"></script>
	<script src="../../js/config.js"></script>
	<script src="../../modules/config.js"></script>
	<script src="../../js/utils.js"></script>

	<script>
		var vue = new Vue({
			el: '#app',
			data: {
				detail: {
					id: 0
				},
				detailTable: 'caipinxinxi',
				baseurl: '',
			},
			methods: {
				jump(url) {
					jump(url)
				},
			}
		})

		layui.use(['layer', 'form', 'element', 'carousel', 'http', 'jquery', 'laypage'], function() {
			var layer = layui.layer;
			var form = layui.form;
			var carousel = layui.carousel;
			var http = layui.http;
			var jquery = layui.jquery;
			var laypage = layui.laypage;

			var id = http.getParam('id');
			vue.detail.id = id;
			vue.baseurl = http.baseurl;

			http.request(vue.detailTable + '/detail/' + id, 'get', {}, function(res) {
				vue.detail = res.data
			});
		});
	</script>
</body>
</html>
