<!DOCTYPE html>
<html>
<head lang="en">
<meta charset="utf-8">
<title>菜品信息</title>
<meta name="keywords" content="" />
<meta name="description" content="" />
<meta name="renderer" content="webkit">
<meta http-equiv="X-UA-Compatible" content="IE=edge"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="stylesheet" href="../../layui/css/layui.css">
<link rel="stylesheet" href="../../xznstatic/css/common.css"/>
<link rel="stylesheet" href="../../xznstatic/css/style.css"/>
<script type="text/javascript" src="../../xznstatic/js/jquery-1.11.3.min.js"></script>
<script type="text/javascript" src="../../xznstatic/js/jquery.SuperSlide.2.1.1.js"></script>
</head>
<style>
	html::after {
		position: fixed;
		top: 0;
		right: 0;
		left: 0;
		bottom: 0;
		content: '';
		display: block;
		background-attachment: fixed;
		background-size: cover;
		background-position: center;
		background-image: url(http://codegen.caihongy.cn/20220129/e25ed31f7389488a8bafe4379c6892d7.png);
	}
	#test1 {
		overflow: hidden;
	}
	#test1 .layui-carousel-ind li {
		width: 16px;
		height: 10px;
		border-width: 0;
		border-style: solid;
		border-color: rgba(0,0,0,.3);
		border-radius: 3px;
		background-color: #f7f7f7;
		box-shadow: 0 0 6px rgba(255,0,0,.8);
	}
	#test1 .layui-carousel-ind li.layui-this {
		width: 24px;
		height: 10px;
		border-width: 0;
		border-style: solid;
		border-color: rgba(0,0,0,.3);
		border-radius: 0;
		background-color: red;
		box-shadow: 0 0 6px rgba(255,0,0,.8);
	}

	.recommend {
		padding: 10px 0;
		display: flex;
		justify-content: center;
		background-repeat: no-repeat;
		background-position: center center;
		background-size: cover;
	}
	.recommend .box {
		width: 1002px;
		margin: 0 auto;
	}
	.recommend .box .title {
		padding: 10px 5px;
		display: flex;
		justify-content: space-between;
		align-items: center;
		box-sizing: border-box;
	}
	.recommend .box .title span {
		padding: 0 10px;
		font-size: 16px;
		line-height: 1.4;
	}

	.recommend .box .filter {
		padding: 0 10px;
		display: flex;
		align-items: center;
		box-sizing: border-box;
		width: 100%;
		flex-wrap: wrap;
	}
	.recommend .box .filter .item-list {
		display: flex;
		align-items: center;
		margin-right: 10px;
	}
	.recommend .box .filter .item-list .lable {
		font-size: 14px;
		color: #333;
		box-sizing: border-box;
	}
	.recommend .box .filter .item-list input,
	.recommend .box .filter .item-list select {
		padding: 0 10px;
		box-sizing: border-box;
		outline: none;
	}
	.recommend .box .filter button {
		display: flex;
		padding: 0 10px;
		box-sizing: border-box;
		align-items: center;
		justify-content: center;
		outline: none;
	}
	.recommend .box .filter button i {
		margin-right: 4px;
	}

	.recommend .box .news {
		display: flex;
		flex-wrap: wrap;
		padding: 0;
		width: 100%;
	}

	.recommend .box .news .list-item {
		flex: 0 0 33.33%;
		padding: 0 10px;
		box-sizing: border-box;
	}
	.recommend .box .news .list-item .list-item-body {
		cursor: pointer;
		border: 1px solid rgba(0, 0, 0, 3);
		padding: 10px;
		box-sizing: border-box;
		display: flex;
		flex-direction: column;
		background: #fff;
		border-radius: 12px;
		overflow: hidden;
		transition: transform 0.3s, box-shadow 0.3s;
	}
	.recommend .box .news .list-item .list-item-body:hover {
		transform: translateY(-4px);
		box-shadow: 0 8px 20px rgba(0,0,0,0.15);
	}
	.recommend .box .news .list-item .list-item-body .item-img {
		width: 100%;
		height: 180px;
		overflow: hidden;
		border-radius: 8px;
		margin-bottom: 10px;
	}
	.recommend .box .news .list-item .list-item-body .item-img img {
		width: 100%;
		height: 100%;
		object-fit: cover;
		transition: transform 0.3s;
	}
	.recommend .box .news .list-item .list-item-body:hover .item-img img {
		transform: scale(1.05);
	}
	.recommend .box .news .list-item .list-item-body .item-info {
		flex: 1;
		display: flex;
		flex-direction: column;
		box-sizing: border-box;
	}
	.recommend .box .news .list-item .list-item-body .item-info .name {
		color: #333;
		font-size: 16px;
		box-sizing: border-box;
		font-weight: bold;
		margin-bottom: 6px;
	}
	.recommend .box .news .list-item .list-item-body .item-info .desc {
		color: #666;
		font-size: 13px;
		box-sizing: border-box;
		margin-bottom: 4px;
	}
	.recommend .box .news .list-item .list-item-body .item-info .price {
		color: red;
		font-size: 18px;
		box-sizing: border-box;
		margin-top: 8px;
		font-weight: bold;
	}

	.cancel-btn {
		padding: 6px 20px;
		background-color: rgba(220, 53, 69, 1);
		color: #fff;
		border: none;
		border-radius: 4px;
		cursor: pointer;
		font-size: 14px;
		margin-top: 10px;
	}
	.cancel-btn:hover {
		background-color: rgba(200, 40, 55, 1);
	}

	.layui-laypage .layui-laypage-count {
		padding: 0 10px;
	}
	.layui-laypage .layui-laypage-skip {
		padding-left: 10px;
	}
</style>
<body>
  <div id="app">
    <div class="banner">
      <div class="layui-carousel" id="test1" :style='{"boxShadow":"0 0 0px rgba(255,0,0,.8)","margin":"0 auto","borderColor":"rgba(0,0,0,.3)","borderRadius":"0","borderWidth":"0","width":"100%","borderStyle":"solid"}'>
      	  <div carousel-item>
      		<div v-for="(item,index) in swiperList" :key="index">
      			<img style="width: 100%;height: 100%;object-fit:cover;" :src="item.img" />
      		</div>
      	  </div>
      	</div>
    </div>

	<div class="recommend index-pv1" :style='{"padding":"10px 0 10px 0","boxShadow":"0 0 0px rgba(255,0,0,.8)","margin":"0px 0 0 0","borderColor":"rgba(0,0,0,.3)","borderRadius":"0","borderWidth":"0","background":"transparent","borderStyle":"solid"}'>
		<div class="box" style='width:80%'>
	    <div class="title" :style='{"padding":"10px 0 10px 0","boxShadow":"0 0 0px rgba(255,0,0,.8)","margin":"10px 0 10px 0","borderColor":"rgba(213, 169, 122, 1)","backgroundColor":"rgba(223, 195, 153, 1)","borderRadius":"10px","borderWidth":"10px 0 0","borderStyle":"solid","justifyContent":"space-between","height":"54px"}'>
	      <span :style='{"padding":"0 10px","boxShadow":"0 0 6px rgba(255,0,0,0)","borderColor":"rgba(255,0,0,1)","backgroundColor":"rgba(0,0,0,0)","color":"rgba(255, 255, 255, 1)","borderRadius":"0 0 2px 0","borderWidth":"0","fontSize":"18px","borderStyle":"solid"}'>菜品信息</span><span :style='{"padding":"0 10px","boxShadow":"0 0 6px rgba(255,0,0,0)","borderColor":"rgba(0,0,0,0)","backgroundColor":"rgba(0,0,0,0)","color":"rgba(255, 255, 255, 1)","borderRadius":"0","borderWidth":"0","fontSize":"14px","borderStyle":"solid"}'>您现在的位置：菜品信息</span>
	    </div>
		<form class="layui-form filter" :style='{"padding":"0 10px","boxShadow":"0 0 0px rgba(255,0,0,.8)","margin":"10px 0 10px 0","borderColor":"rgba(0,0,0,.3)","backgroundColor":"rgba(255, 255, 255, 0)","borderRadius":"4px","borderWidth":"0","borderStyle":"solid","justifyContent":"flex-end","height":"64px"}'>
			<div class="item-list">
				<div class="lable" :style='{"padding":"0 10px","boxShadow":"0 0 6px rgba(255,0,0,0)","margin":"0","borderColor":"rgba(0,0,0,0)","backgroundColor":"transparent","color":"rgba(0, 0, 0, 1)","borderRadius":"0","textAlign":"right","borderWidth":"0","width":"auto","fontSize":"16px","borderStyle":"solid"}'>菜品名称</div>
				<input type="text" :style='{"boxShadow":"0 0 6px rgba(255,0,0,0)","borderColor":"#ccc","backgroundColor":"rgba(233, 233, 233, 1)","color":"rgba(0, 0, 0, 1)","borderRadius":"8px","textAlign":"center","borderWidth":"0","width":"140px","fontSize":"16px","borderStyle":"solid","height":"44px"}' name="caipinmingcheng" id="caipinmingcheng" placeholder="菜品名称" autocomplete="off" class="layui-input">
			</div>
			<button :style='{"padding":"0 20px","boxShadow":"0 0 0px rgba(0,0,0,0)","margin":"0 0 0 10px","borderColor":"#409EFF","backgroundColor":"rgba(203, 148, 92, 1)","color":"#fff","borderRadius":"44px","borderWidth":"0","width":"auto","fontSize":"14px","borderStyle":"solid","height":"40px"}' id="btn-search" type="button" class="layui-btn layui-btn-normal">
			  <i v-if="true" class="layui-icon layui-icon-search"></i>搜索
			</button>
		</form>
	    <div class="list news" style="position: relative;width: 100%;">
	      <div @click="jump('../caipinxinxi/detail.html?id='+item.id)" v-for="(item,index) in dataList" :key="index" class="list-item">
	        <div class="list-item-body animation-box" :style='{"padding":"10px","boxShadow":"0px 3px 6px rgba(0, 0, 0, 0.16)","margin":"0 0 10px 0","borderColor":"rgba(213, 169, 122, 1)","backgroundColor":"#fff","borderRadius":"12px","borderWidth":"0","borderStyle":"solid"}'>
	          <div class="item-img">
	            <img :src="item.caipintupian ? baseurl + item.caipintupian : '../../xznstatic/img/zwimg.jpg'" :alt="item.caipinmingcheng">
	          </div>
	          <div class="item-info">
				  <div :style='{"isshow":true,"padding":"0","margin":"5px 0 0 0","backgroundColor":"rgba(0,0,0,0)","color":"rgba(0, 0, 0, 1)","borderRadius":"0","textAlign":"left","width":"100%","fontSize":"16px"}' class="name">{{item.caipinmingcheng}}</div>
				  <div :style='{"padding":"0","margin":"5px 0 0 0","backgroundColor":"rgba(0,0,0,0)","color":"rgba(102, 102, 102, 1)","borderRadius":"0","textAlign":"left","width":"100%","fontSize":"13px"}' class="desc">{{item.canleixing}} · 份额：{{item.fene}}</div>
				  <div :style='{"padding":"0","margin":"5px 0 0 0","backgroundColor":"rgba(0,0,0,0)","color":"red","borderRadius":"0","textAlign":"left","width":"100%","fontSize":"18px"}' class="price"><span :style='{"fontSize":"12px"}'>￥</span>{{Number(item.jiage).toFixed(2)}}</div>
	          </div>
	        </div>
	      </div>
	      <div v-if="dataList.length==0" style="text-align:center;padding:40px;color:#999;font-size:16px;">暂无菜品信息</div>
	    </div>
		<div class="pager" id="pager" :style="{textAlign:2==1?'left':2==2?'center':'right'}"></div>
	  </div>
	</div>
  </div>

  <script src="../../layui/layui.js"></script>
  <script src="../../js/vue.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../modules/config.js"></script>
  <script src="../../js/utils.js"></script>

  <script type="text/javascript">
    var vue = new Vue({
      el: '#app',
      data: {
        swiperList: [],
        dataList: [],
		baseurl: '',
      },
      methods: {
      	isAuth(tablename, button) {
          return isFrontAuth(tablename, button)
        },
        jump(url) {
          jump(url)
        }
      }
    });

    layui.use(['layer', 'element', 'carousel', 'laypage', 'http', 'jquery','laydate'], function() {
	var layer = layui.layer;
	var element = layui.element;
	var carousel = layui.carousel;
	var laypage = layui.laypage;
	var http = layui.http;
	var jquery = layui.jquery;
	var laydate = layui.laydate;

	var limit = 6;
	vue.baseurl = http.baseurl;

      // 获取轮播图 数据
      http.request('config/list', 'get', {
        page: 1,
        limit: 5
      }, function(res) {
        if (res.data.list.length > 0) {
          let swiperList = [];
          res.data.list.forEach(element => {
            if (element.value != null) {
              swiperList.push({
                img: http.baseurl+element.value
              });
            }
          });
          vue.swiperList = swiperList;
		  vue.$nextTick(() => {
		    carousel.render({
		    	elem: '#test1',
		  		width: '100%',
		    	height: '300px',
		    	arrow: 'hover',
		    	anim: 'default',
		    	autoplay: 'true',
		    	interval: '3000',
		    	indicator: 'none'
		    });
		  })
        }
      });

      // 分页列表
      pageList();

      // 搜索按钮
      jquery('#btn-search').click(function(e) {
        pageList();
      });

      function pageList() {
        var param = {
          page: 1,
          limit: limit
        }

        if (jquery('#caipinmingcheng').val()) {
          param['caipinmingcheng'] = '%' + jquery('#caipinmingcheng').val() + '%';
        }

        // 获取列表数据
        http.request('caipinxinxi/list', 'get', param, function(res) {
          vue.dataList = res.data.list
          // 分页
          laypage.render({
            elem: 'pager',
            count: res.data.total,
            limit: limit,
            groups: 5,
            layout: ["prev","page","next"],
            theme: '#CB945C',
            jump: function(obj, first) {
            	param.page = obj.curr;
              if (!first) {
                http.request('caipinxinxi/list', 'get', param, function(res) {
                  vue.dataList = res.data.list
                })
              }
            }
          });
        })
      }
    });
  </script>
</body>
</html>
